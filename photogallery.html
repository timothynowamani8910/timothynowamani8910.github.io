<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOTO GALLERY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f5f7fc 0%, #e9eef4 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            color: #1e2a3e;
        }

        /* CONTAINER */
        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(2px);
            border-radius: 2.5rem;
            padding: 2rem 1.8rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.5);
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f5e3a, #2c8c5a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        .sub {
            color: #2c5a6e;
            margin-bottom: 2rem;
            border-left: 4px solid #2c8c5a;
            padding-left: 1rem;
            font-weight: 500;
        }

        /* UPLOAD SECTION (JS principle: capture files) */
        .upload-area {
            background: white;
            border-radius: 2rem;
            padding: 1.2rem 1.5rem;
            margin-bottom: 2.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            box-shadow: 0 8px 14px rgba(0,0,0,0.05);
            border: 1px solid #e2edf2;
        }

        .file-label {
            background: #1e4668;
            color: white;
            padding: 0.7rem 1.8rem;
            border-radius: 3rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .file-label:hover {
            background: #0f2e48;
            transform: scale(1.02);
        }

        input[type="file"] {
            display: none;
        }

        .info-badge {
            background: #d9e6f2;
            border-radius: 3rem;
            padding: 0.5rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e4668;
        }

        /* GALLERY GRID (CSS Grid + Flex) */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0 2rem;
        }

        /* CARD element */
        .gallery-card {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 12px 20px -10px rgba(0,0,0,0.1);
            transition: transform 0.25s, box-shadow 0.3s;
            cursor: pointer;
            animation: fadeInUp 0.4s ease backwards;
            border: 1px solid #f0f4f9;
        }

        .gallery-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 22px 28px -12px rgba(0,0,0,0.2);
        }

        .card-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
            transition: transform 0.4s;
        }

        .gallery-card:hover .card-img {
            transform: scale(1.02);
        }

        .card-info {
            padding: 1rem 1.2rem 1.2rem;
            background: white;
        }

        .card-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 0.25rem;
            color: #1e2a3e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #bb2e3e;
            opacity: 0.6;
            transition: 0.2s;
            font-weight: bold;
            padding: 0 4px;
        }

        .delete-btn:hover {
            opacity: 1;
            transform: scale(1.1);
            background: none;
        }

        .timestamp {
            font-size: 0.7rem;
            color: #6c8e9e;
            margin-top: 6px;
        }

        /* MODAL (lightbox - JS) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
        }

        .modal.active {
            display: flex;
            animation: fade 0.2s;
        }

        .modal-content {
            max-width: 85vw;
            max-height: 85vh;
            border-radius: 1.2rem;
            box-shadow: 0 30px 40px rgba(0,0,0,0.4);
            border: 2px solid white;
        }

        .modal-caption {
            position: absolute;
            bottom: 25px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .close-modal {
            position: absolute;
            top: 25px;
            right: 35px;
            font-size: 2.5rem;
            color: white;
            background: rgba(0,0,0,0.5);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.15s;
        }

        .close-modal:hover {
            background: #bb2e3e;
            transform: scale(1.05);
        }

        /* empty state */
        .empty-gallery {
            text-align: center;
            padding: 3rem;
            background: #f1f5f9;
            border-radius: 2rem;
            color: #597a8f;
            font-weight: 500;
            margin: 1rem 0;
        }

        /* utility */
        button {
            background: #eef2f7;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #5f7f92;
        }

        @media (max-width: 640px) {
            .gallery-container {
                padding: 1rem;
            }
            h1 { font-size: 1.9rem; }
        }
    </style>
</head>
<body>

<div class="gallery-container">
    <h1>📸 Lightbox Gallery</h1>
    <div class="sub">✨ Upload images | Click to enlarge | Double-click to delete (or use trash icon)</div>

    <!-- Upload + controls: demonstrates forms, event handlers, file reading -->
    <div class="upload-area">
        <div>
            <label for="imageUpload" class="file-label">📤 + Upload Image</label>
            <input type="file" id="imageUpload" accept="image/jpeg, image/png, image/webp, image/jpg">
        </div>
        <div class="info-badge">
            🖼️ <span id="imageCount">0</span> images • Click any photo to view
        </div>
        <button id="clearAllBtn" style="background:#f0e2e2; color:#b13e4b;">🗑️ Clear all</button>
    </div>

    <!-- Gallery grid injected via JS -->
    <div id="galleryGrid" class="gallery-grid">
        <!-- sample default images to demonstrate (3 demo images) -->
        <!-- they will be loaded via JavaScript as default data -->
    </div>
    <footer>💡 JavaScript features: dynamic add/delete, localStorage persistence, modal lightbox, fileReader API</footer>
</div>

<!-- Modal Lightbox -->
<div id="lightboxModal" class="modal">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="modalImage" alt="enlarged view">
    <div class="modal-caption" id="modalCaption"></div>
</div>

<script>
    // ---------- HTML, CSS & JS principle: Data persistence, event delegation, dynamic rendering ----------
    let galleryItems = [];   // each item: { id, src, name, date }

    // DOM elements
    const galleryGrid = document.getElementById('galleryGrid');
    const fileInput = document.getElementById('imageUpload');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const imageCountSpan = document.getElementById('imageCount');
    const modal = document.getElementById('lightboxModal');
    const modalImg = document.getElementById('modalImage');
    const modalCaption = document.getElementById('modalCaption');
    const closeModalBtn = document.querySelector('.close-modal');

    // Helper: save to localStorage (web storage principle)
    function saveToLocalStorage() {
        // we can't store raw images data efficiently in localStorage; we store image URLs (blob/dataURL for user uploads)
        // But note: using dataURL for many large images may exceed limit. For demo, we store only references for default + user uploaded as dataURL (small images)
        // Better approach: store base64 for small gallery. We'll keep it safe.
        const itemsToStore = galleryItems.map(item => ({
            id: item.id,
            src: item.src,      // this contains dataURL for uploaded images, or default URL
            name: item.name,
            date: item.date
        }));
        localStorage.setItem('photo_gallery', JSON.stringify(itemsToStore));
        updateCounter();
    }

    // update image counter UI
    function updateCounter() {
        imageCountSpan.innerText = galleryItems.length;
    }

    // Render gallery from galleryItems array (pure JS DOM manipulation)
    function renderGallery() {
        if (!galleryGrid) return;
        if (galleryItems.length === 0) {
            galleryGrid.innerHTML = `<div class="empty-gallery">📭 No images yet. Upload some photos using the button above!</div>`;
            updateCounter();
            return;
        }

        let html = '';
        galleryItems.forEach(item => {
            // escape name for safety
            const safeName = escapeHtml(item.name);
            html += `
                <div class="gallery-card" data-id="${item.id}">
                    <img class="card-img" src="${item.src}" alt="${safeName}" loading="lazy">
                    <div class="card-info">
                        <div class="card-title">
                            <span>${safeName.length > 20 ? safeName.substring(0,18)+'…' : safeName}</span>
                            <button class="delete-btn" data-id="${item.id}" title="delete image">🗑️</button>
                        </div>
                        <div class="timestamp">📅 ${item.date}</div>
                    </div>
                </div>
            `;
        });
        galleryGrid.innerHTML = html;
        updateCounter();
    }

    // simple escape to prevent XSS (principle of security)
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // generate unique id
    function generateId() {
        return Date.now() + '-' + Math.random().toString(36).substr(2, 6);
    }

    // add new image item (supports dataURL)
    function addImageItem(dataUrl, fileName) {
        const now = new Date();
        const formattedDate = `${now.toLocaleDateString()} ${now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
        const newItem = {
            id: generateId(),
            src: dataUrl,
            name: fileName || `Image ${galleryItems.length+1}`,
            date: formattedDate
        };
        galleryItems.unshift(newItem);  // newest first
        renderGallery();
        saveToLocalStorage();
    }

    // delete single image
    function deleteImageById(id) {
        galleryItems = galleryItems.filter(item => item.id != id);
        renderGallery();
        saveToLocalStorage();
    }

    // clear all images
    function clearAllImages() {
        if (confirm('⚠️ Delete ALL images? This action cannot be undone.')) {
            galleryItems = [];
            renderGallery();
            saveToLocalStorage();
        }
    }

    // handle file upload (FileReader API, event handling)
    function handleFileUpload(event) {
        const files = event.target.files;
        if (!files.length) return;

        Array.from(files).forEach(file => {
            if (!file.type.startsWith('image/')) {
                alert(`"${file.name}" is not an image file.`);
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                alert(`"${file.name}" exceeds 5MB. Please upload smaller image.`);
                return;
            }
            const reader = new FileReader();
            reader.onload = function(ev) {
                const dataUrl = ev.target.result;
                let fileName = file.name;
                if (fileName.length > 35) fileName = fileName.substring(0, 30) + '...';
                addImageItem(dataUrl, fileName);
            };
            reader.onerror = function() {
                alert('Failed to read file.');
            };
            reader.readAsDataURL(file);
        });
        fileInput.value = ''; // reset input
    }

    // Modal Lightbox logic (JavaScript event delegation & classList)
    function setupLightboxEvents() {
        // event delegation on gallery grid
        galleryGrid.addEventListener('click', (e) => {
            // find if clicked on .gallery-card or img or delete button
            const deleteBtn = e.target.closest('.delete-btn');
            if (deleteBtn) {
                e.stopPropagation();
                const id = deleteBtn.getAttribute('data-id');
                if (id) deleteImageById(id);
                return;
            }

            // otherwise open modal for image
            const card = e.target.closest('.gallery-card');
            if (card && !deleteBtn) {
                const id = card.getAttribute('data-id');
                const foundItem = galleryItems.find(item => item.id == id);
                if (foundItem) {
                    modalImg.src = foundItem.src;
                    modalCaption.innerText = `${foundItem.name} • ${foundItem.date}`;
                    modal.classList.add('active');
                }
            }
        });
    }

    // close modal functions
    function closeModal() {
        modal.classList.remove('active');
        modalImg.src = '';
    }

    // Load from localStorage (previous state)
    function loadInitialData() {
        const stored = localStorage.getItem('photo_gallery');
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                if (Array.isArray(parsed) && parsed.length) {
                    galleryItems = parsed;
                    renderGallery();
                    return;
                }
            } catch(e) { console.warn(e); }
        }
        // Default demo images (3 placeholders using free high-res stock images from picsum)
        const defaultImages = [
            { name: 'Mountain Sunset', url: 'https://picsum.photos/id/104/300/300', date: 'Demo — Apr 12, 2025' },
            { name: 'City Lights', url: 'https://picsum.photos/id/106/300/300', date: 'Demo — Apr 10, 2025' },
            { name: 'Abstract Ocean', url: 'https://picsum.photos/id/23/300/300', date: 'Demo — Apr 8, 2025' }
        ];
        galleryItems = defaultImages.map((img, idx) => ({
            id: generateId() + idx,
            src: img.url,
            name: img.name,
            date: img.date
        }));
        renderGallery();
        saveToLocalStorage();
    }

    // Image double-click to delete (optional advanced principle) - double click on image -> delete card also
    galleryGrid.addEventListener('dblclick', (e) => {
        const card = e.target.closest('.gallery-card');
        if (card) {
            const id = card.getAttribute('data-id');
            if (id && confirm('Double-click: delete this image?')) {
                deleteImageById(id);
            }
        }
    });

    // Modal close events
    closeModalBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
    });

    // Clear all
    clearAllBtn.addEventListener('click', clearAllImages);

    // File upload listener
    fileInput.addEventListener('change', handleFileUpload);

    // on window load init
    window.addEventListener('DOMContentLoaded', () => {
        loadInitialData();
        setupLightboxEvents();
    });
</script>
</body>
</html>
